name: Databricks CI/CD

on:
  push:
    branches:
      - "feature/databricks-*"
    paths:
      - "databricks.yml"
      - "resources/**"
      - ".github/workflows/databricks_ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "databricks.yml"
      - "resources/**"
      - ".github/workflows/databricks_ci.yml"

env:
  DATABRICKS_HOST: https://adb-7405617611340377.17.azuredatabricks.net
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  # ── Stage 1: Validate Bundle ───────────────────────────────────────────
  validate:
    name: Validate DAB Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: |
          databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ env.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}

  # ── Stage 2: Deploy to DEV ────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: validate
    environment: development
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to development
        run: |
          databricks bundle deploy --target development
        env:
          DATABRICKS_HOST: ${{ env.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}

      - name: Print deployment summary
        run: |
          echo "✅ Deployed C-360 bundle to DEVELOPMENT"
          echo "   Workspace: ${{ env.DATABRICKS_HOST }}"
          echo "   Target: development"
          echo "   Commit: ${{ github.sha }}"

  # ── Stage 3: Deploy to PROD (manual approval gate) ────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to production
        run: |
          databricks bundle deploy --target production
        env:
          DATABRICKS_HOST: ${{ env.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ env.DATABRICKS_TOKEN }}

      - name: Print deployment summary
        run: |
          echo "✅ Deployed C-360 bundle to PRODUCTION"
          echo "   Workspace: ${{ env.DATABRICKS_HOST }}"
          echo "   Target: production"
          echo "   Commit: ${{ github.sha }}"
