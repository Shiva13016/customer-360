name: ADF CI/CD - Customer 360 Canada Life

on:
  push:
    branches:
      - 'feature/adf-**'
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Commit SHA to deploy (for rollback)'
        required: false
        default: ''

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP_DEV: rg-c360-prod
  RESOURCE_GROUP_PROD: rg-c360-prod
  ADF_NAME_DEV: adf-c360-canadalife
  ADF_NAME_PROD: adf-c360-canadalife
  ARM_TEMPLATE: adf/arm_templates/ARMTemplateForFactory.json
  ARM_PARAMS_DEV: adf/arm_templates/ARMTemplateParametersForFactory-dev.json
  ARM_PARAMS_PROD: adf/arm_templates/ARMTemplateParametersForFactory-prod.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Stage 1: Validate ARM Template
  validate-arm:
    name: Validate ARM Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate ARM Template (DEV)
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_DEV }}
          template: ${{ env.ARM_TEMPLATE }}
          parameters: ${{ env.ARM_PARAMS_DEV }} linkedServiceBlobStorage_connectionString="${{ secrets.ADF_BLOB_CONNECTION_STRING }}"
          deploymentMode: Validate

  # Stage 2: Check for un-substituted variables
  check-vars:
    name: Check for Un-substituted Variables
    runs-on: ubuntu-latest
    needs: validate-arm
    steps:
      - uses: actions/checkout@v4

      - name: Run variable check script
        run: python scripts/check_vars.py --path adf/

  # Stage 3: Quota Pre-flight
  quota-preflight:
    name: Quota Pre-flight Check
    runs-on: ubuntu-latest
    needs: check-vars
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run quota pre-flight
        run: bash scripts/quota_preflight.sh ${{ env.AZURE_SUBSCRIPTION_ID }}

  # Stage 4: Deploy to DEV
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: quota-preflight
    environment: development
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ARM Template to DEV
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_DEV }}
          template: ${{ env.ARM_TEMPLATE }}
          parameters: ${{ env.ARM_PARAMS_DEV }} linkedServiceBlobStorage_connectionString="${{ secrets.ADF_BLOB_CONNECTION_STRING }}"
          deploymentMode: Incremental

  # Stage 5: Deploy to PROD (requires manual approval)
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [quota-preflight, deploy-dev]
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ARM Template to PROD
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_PROD }}
          template: ${{ env.ARM_TEMPLATE }}
          parameters: ${{ env.ARM_PARAMS_PROD }} linkedServiceBlobStorage_connectionString="${{ secrets.ADF_BLOB_CONNECTION_STRING }}"
          deploymentMode: Incremental
