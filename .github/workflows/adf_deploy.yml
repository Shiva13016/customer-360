name: ADF CI/CD - Customer 360 Canada Life

# Branching strategy:
#   feature/adf-* → develop → main
#
#   1. Push to feature/adf-*  → Validate + checks (CI gate)
#   2. PR to develop           → Validate + checks (CI gate)
#   3. Push to develop         → Deploy to DEV environment
#   4. Push to main            → Deploy to PROD (manual approval required)

on:
  push:
    branches:
      - 'feature/adf-**'   # Validate on feature branch pushes
      - develop              # Deploy to DEV when merged into develop
      - main                 # Deploy to PROD when merged into main
  pull_request:
    branches:
      - develop   # PR from feature/adf-* → develop
      - main      # PR from develop → main
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Commit SHA to deploy (for rollback)'
        required: false
        default: ''

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP_DEV: rg-c360-prod
  RESOURCE_GROUP_PROD: rg-c360-prod
  ADF_NAME_DEV: adf-c360-canadalife
  ADF_NAME_PROD: adf-c360-canadalife
  ARM_TEMPLATE: adf/arm_templates/ARMTemplateForFactory.json
  ARM_PARAMS_DEV: adf/arm_templates/ARMTemplateParametersForFactory-dev.json
  ARM_PARAMS_PROD: adf/arm_templates/ARMTemplateParametersForFactory-prod.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Stage 1: Validate ARM Template — runs on all triggers
  validate-arm:
    name: Validate ARM Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.sha }}
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Validate ARM template against DEV
        run: |
          echo 'Validating ADF ARM template...'
          az deployment group validate \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --template-file ${{ env.ARM_TEMPLATE }} \
            --parameters @${{ env.ARM_PARAMS_DEV }}

  # Stage 2: Regex check for unresolved dollar-brace patterns
  check-vars:
    name: Check Unresolved Variable Patterns
    runs-on: ubuntu-latest
    needs: validate-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scan JSON for unresolved patterns
        run: python scripts/check_vars.py --path adf/

  # Stage 3: Compute quota pre-flight
  quota-preflight:
    name: Quota Pre-flight Check
    runs-on: ubuntu-latest
    needs: check-vars
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Run az vm list-skus quota check
        run: bash scripts/quota_preflight.sh ${{ env.AZURE_SUBSCRIPTION_ID }}

  # Stage 4: Deploy to DEV — only on push to develop
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: quota-preflight
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: adf-development
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.sha }}
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Stop ADF triggers before deploy
        run: bash scripts/validate_arm.sh stop ${{ env.ADF_NAME_DEV }} ${{ env.RESOURCE_GROUP_DEV }}
      - name: Deploy ARM to DEV
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_DEV }}
          template: ${{ env.ARM_TEMPLATE }}
          parameters: ${{ env.ARM_PARAMS_DEV }}
          deploymentName: adf-c360-dev-${{ github.run_number }}
      - name: Restart ADF triggers after deploy
        run: bash scripts/validate_arm.sh start ${{ env.ADF_NAME_DEV }} ${{ env.RESOURCE_GROUP_DEV }}

  # Stage 5: Deploy to PROD — only on push to main (manual approval required)
  # Approvers configured in GitHub repo Settings > Environments > adf-production
  deploy-prod:
    name: Deploy to PROD - Manual Approval Required
    runs-on: ubuntu-latest
    needs: quota-preflight
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: adf-production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha || github.sha }}
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Stop ADF triggers before deploy
        run: bash scripts/validate_arm.sh stop ${{ env.ADF_NAME_PROD }} ${{ env.RESOURCE_GROUP_PROD }}
      - name: Deploy ARM to PROD
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_PROD }}
          template: ${{ env.ARM_TEMPLATE }}
          parameters: ${{ env.ARM_PARAMS_PROD }}
          deploymentName: adf-c360-prod-${{ github.run_number }}
      - name: Restart ADF triggers after deploy
        run: bash scripts/validate_arm.sh start ${{ env.ADF_NAME_PROD }} ${{ env.RESOURCE_GROUP_PROD }}
